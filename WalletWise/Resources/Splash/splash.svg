<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Wallet icon -->
  <rect x="60" y="80" width="280" height="175" rx="24" fill="#C9A84C"/>
  <rect x="60" y="110" width="280" height="145" rx="14" fill="#C9A84C"/>
  <path d="M84 80 Q84 50 110 50 L290 50 Q316 50 316 80 Z" fill="#E0BC6E"/>

  <!-- Card slot -->
  <rect x="210" y="130" width="105" height="60" rx="12" fill="#0F4C3A" opacity="0.85"/>
  <circle cx="268" cy="160" r="15" fill="#C9A84C" opacity="0.6"/>
  <circle cx="284" cy="160" r="15" fill="#E0BC6E" opacity="0.75"/>

  <!-- W letter on wallet -->
  <text x="74" y="218" font-family="Georgia, serif" font-size="90" font-weight="bold" fill="#0F4C3A" opacity="0.88">W</text>

  <!-- Divider -->
  <line x1="100" y1="285" x2="300" y2="285" stroke="#C9A84C" stroke-width="1.5" opacity="0.7"/>

  <!-- App name -->
  <text x="200" y="325" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#F5E6C8" text-anchor="middle" letter-spacing="2">WalletWise</text>

  <!-- Tagline -->
  <text x="200" y="358" font-family="Georgia, serif" font-size="13" fill="#C9A84C" text-anchor="middle" letter-spacing="2" opacity="0.9">YOUR FINANCIAL CLARITY</text>
</svg>
